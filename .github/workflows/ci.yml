name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel prior in-flight runs for the same branch when a new push lands
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: this workflow only reads the repo
permissions:
  contents: read

# CI-only fake values — env.ts Zod schema requires these.
# Real prod env lives in Vercel; CI never connects to a database.
env:
  DATABASE_PUBLIC_URL: postgresql://ci:ci@localhost:5432/ci
  NEXTAUTH_SECRET: ci-only-fake-secret-must-be-at-least-32-chars-long
  NEXTAUTH_URL: http://localhost:3000

jobs:
  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn prisma generate
      - run: yarn type-check

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn prisma generate
      - run: yarn lint

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn prisma generate
      - run: yarn test --ci --maxWorkers=2

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Override workflow-level fakes with the service container URLs
      DATABASE_PUBLIC_URL: postgresql://ci:ci@localhost:5432/ci
      DATABASE_TEST_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn prisma generate
      - run: yarn prisma migrate deploy
      - name: Install Playwright browsers
        run: yarn playwright install --with-deps chromium
      - name: Run e2e tests
        run: yarn test:e2e:ci
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # PR-only: blocks merge if a new/upgraded dep introduces a known CVE
  # or ships under a non-allowlisted license. Standalone job (no
  # `needs:` graph), so it doesn't gate the build/test/lint matrix.
  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          # Only fail on runtime (production) deps. devDep CVEs warn
          # but don't block — a public starter ships no end-user code,
          # so devDep tooling churn shouldn't block routine merges.
          fail-on-scopes: runtime
          comment-summary-in-pr: on-failure
          license-check: true
          allow-licenses: MIT, ISC, Apache-2.0, BSD-2-Clause, BSD-3-Clause, 0BSD, CC0-1.0, Unlicense, BlueOak-1.0.0, MPL-2.0
